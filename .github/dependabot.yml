version: 2
updates:
  # Keep the actions in our workflows up to date.
  # This is the only ecosystem we need: the PWA has no npm/pip/etc. deps.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      # Bundle all action bumps into a single PR per week to avoid noise.
      actions:
        patterns:
          - "*"
