name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Only one deploy at a time; if a newer commit lands while one is running,
# cancel any pending ones but let the in-flight one finish (so we don't
# leave Pages in a broken half-deployed state).
concurrency:
  group: pages
  cancel-in-progress: false

# Permissions required by the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Package site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Repo root is the site — index.html, manifest.json, sw.js,
          # assets/, apps/. No build step.
          path: "."

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
