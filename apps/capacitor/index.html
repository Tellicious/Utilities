<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f2f2f7">
    <link rel="manifest" href="../../manifest.json">
    <link rel="stylesheet" href="../../assets/styles.css">
    <script src="../../assets/app.js"></script>
    <title>Capacitor — Utilities</title>
</head>

<body>
    <header class="appbar"><a class="appbar__back" href="../../index.html"><svg width="11" height="18"
                viewBox="0 0 11 18" fill="none">
                <path d="M9.5 1.5L1.5 9l8 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg><span>Utilities</span></a><span class="appbar__spacer"></span></header>
    <main class="tool-shell">
        <section class="tool-card">
            <h2 class="tool-card__title">Capacitor Code</h2><label class="tool-label" for="capCode">Code or
                value</label><input id="capCode" class="tool-input" autocomplete="off" placeholder="104, 4n7, 0.1uF">
            <div class="tool-result">
                <div id="capValue" class="tool-result__value">—</div>
                <div id="capMeta" class="tool-result__meta">3-digit codes are in pF.</div>
            </div>
        </section>
    </main>
    <script src="capacitor.js"></script>
</body>

</html>
