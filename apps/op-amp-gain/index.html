<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f2f2f7">
    <link rel="manifest" href="../../manifest.json">
    <link rel="stylesheet" href="../../assets/styles.css">
    <script src="../../assets/app.js"></script>
    <title>Op-Amp Gain — Utilities</title>
</head>

<body>
    <header class="appbar"><a class="appbar__back" href="../../index.html"><svg width="11" height="18"
                viewBox="0 0 11 18" fill="none">
                <path d="M9.5 1.5L1.5 9l8 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg><span>Utilities</span></a><span class="appbar__spacer"></span></header>
    <main class="tool-shell">
        <section class="tool-card">
            <h2 class="tool-card__title">Op-Amp Gain</h2>
            <div class="control-stack">
                <div class="pill-seg" role="group" aria-label="Topology"><button id="noninv"
                        class="seg__btn seg__btn--active" type="button">Non-inverting</button><button id="inv"
                        class="seg__btn" type="button">Inverting</button></div>
            </div>
            <div class="mini-schematic" id="opSchematic" aria-label="Op amp schematic"></div>
            <div class="tool-row"><label><span class="tool-label">Input resistor Rin</span><input id="rin"
                        class="tool-input" inputmode="decimal"></label><span class="tool-unit">Ω</span>
            </div>
            <div class="tool-row"><label><span class="tool-label">Feedback resistor Rf</span><input id="rf"
                        class="tool-input" inputmode="decimal"></label><span class="tool-unit">Ω</span>
            </div>
            <div class="tool-result">
                <div id="opValue" class="tool-result__value">—</div>
                <div id="opMeta" class="tool-result__meta"></div>
            </div>
        </section>
    </main>
    <script src="op-amp-gain.js"></script>
</body>

</html>
