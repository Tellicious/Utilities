<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f2f2f7">
    <link rel="manifest" href="../../manifest.json">
    <link rel="stylesheet" href="../../assets/styles.css">
    <script src="../../assets/app.js"></script>
    <title>Series / Parallel — Utilities</title>
</head>

<body>
    <header class="appbar"><a class="appbar__back" href="../../index.html"><svg width="11" height="18"
                viewBox="0 0 11 18" fill="none">
                <path d="M9.5 1.5L1.5 9l8 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg><span>Utilities</span></a><span class="appbar__spacer"></span></header>
    <main class="tool-shell">
        <section class="tool-card">
            <h2 class="tool-card__title">Series / Parallel</h2>
            <div class="control-stack">
                <div class="pill-seg" role="group" aria-label="Component type"><button id="res"
                        class="seg__btn seg__btn--active" type="button">Resistor</button><button id="cap"
                        class="seg__btn" type="button">Capacitor</button></div>
                <div class="pill-seg" role="group" aria-label="Connection"><button id="series"
                        class="seg__btn seg__btn--active" type="button">Series</button><button id="parallel"
                        class="seg__btn" type="button">Parallel</button></div>
            </div>
            <div class="tool-row-group">
                <div class="tool-row"><label><span class="tool-label">Value 1</span><input id="v1" class="tool-input"
                            inputmode="decimal" value="1000"></label><select id="unit1" class="tool-unit-select"
                        aria-label="Value 1 unit"></select></div>
                <div class="tool-row"><label><span class="tool-label">Value 2</span><input id="v2" class="tool-input"
                            inputmode="decimal" value="1000"></label><select id="unit2" class="tool-unit-select"
                        aria-label="Value 2 unit"></select></div>
            </div>
            <div class="tool-row-group">

                <div class="tool-row"><label><span class="tool-label">Value 3</span><input id="v3" class="tool-input"
                            inputmode="decimal"></label><select id="unit3" class="tool-unit-select"
                        aria-label="Value 3 unit"></select></div>
                <div class="tool-row"><label><span class="tool-label">Value 4</span><input id="v4" class="tool-input"
                            inputmode="decimal"></label><select id="unit4" class="tool-unit-select"
                        aria-label="Value 4 unit"></select></div>
            </div>
            <div class="tool-result">
                <div id="spValue" class="tool-result__value">—</div>
                <div id="spMeta" class="tool-result__meta"></div>
            </div>
        </section>
    </main>
    <script src="series-parallel.js"></script>
</body>

</html>
