<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f2f2f7">
    <link rel="manifest" href="../../manifest.json">
    <link rel="stylesheet" href="../../assets/styles.css">
    <script src="../../assets/app.js"></script>
    <title>Voltage Divider — Utilities</title>
</head>

<body>
    <header class="appbar"><a class="appbar__back" href="../../index.html"><svg width="11" height="18"
                viewBox="0 0 11 18" fill="none">
                <path d="M9.5 1.5L1.5 9l8 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg><span>Utilities</span></a><span class="appbar__spacer"></span></header>
    <main class="tool-shell">
        <section class="tool-card">
            <h2 class="tool-card__title">Voltage Divider</h2>
            <div class="mini-schematic" aria-label="Voltage divider schematic"><svg viewBox="0 0 150 186" fill="none"
                    style="width: 80%; height: 234px;">
                    <g stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="105,18 105,32 115,37 95,45 115,53 95,61 115,69 95,77 105,82 105,102"
                            fill="none" />
                        <circle cx="105" cy="95" r="4" fill="currentColor" stroke="none" />
                        <polyline points="105,88 105,108 115,113 95,121 115,129 95,137 115,145 95,153 105,158 105,172"
                            fill="none" />
                        <line x1="105" y1="95" x2="150" y2="95" />
                        <line x1="90" y1="172" x2="120" y2="172" />
                        <line x1="95" y1="178" x2="115" y2="178" />
                        <line x1="100" y1="184" x2="110" y2="184" />
                    </g><text x="75" y="16">V<tspan x="86" y="18" font-size="12">in</text>
                    <text x="126" y="63">R<tspan x="137" y="65" font-size="12">1</tspan></text>
                    <text x="126" y="139">R<tspan x="137" y="141" font-size="12">2</tspan>
                    </text><text x="160" y="99">V<tspan x="171" y="101" font-size="12">out</tspan></text>
                </svg></div>
            <div class="tool-row"><label><span class="tool-label">Input voltage</span><input id="vin" class="tool-input"
                        inputmode="decimal" value="5"></label><span class="tool-unit">V</span></div>
            <div class="tool-row"><label><span class="tool-label">Top resistor R1</span><input id="r1"
                        class="tool-input" inputmode="decimal" value="10000"></label><span class="tool-unit">Ω</span>
            </div>
            <div class="tool-row"><label><span class="tool-label">Bottom resistor R2</span><input id="r2"
                        class="tool-input" inputmode="decimal" value="10000"></label><span class="tool-unit">Ω</span>
            </div>
            <div class="tool-result">
                <div id="vdValue" class="tool-result__value">—</div>
                <div id="vdMeta" class="tool-result__meta"></div>
            </div>
        </section>
    </main>
    <script src="voltage-divider.js"></script>
</body>

</html>
