<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#fafaf9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Utilities">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="assets/styles.css">
  <title>Utilities</title>
</head>
<body>
  <main class="hub" id="hub">
    <header class="hub__header">
      <h1 class="hub__title">Utilities</h1>
      <p class="hub__subtitle">A small set of everyday tools</p>
    </header>

    <nav class="hub__grid" aria-label="Available utilities">
      <a class="tile" href="apps/resistor/index.html">
        <span class="tile__icon" aria-hidden="true">
          <!-- minimal resistor icon -->
          <svg viewBox="0 0 64 32" width="48" height="24">
            <line x1="2" y1="16" x2="14" y2="16" stroke="currentColor" stroke-width="1.5"/>
            <line x1="50" y1="16" x2="62" y2="16" stroke="currentColor" stroke-width="1.5"/>
            <rect x="14" y="8" width="36" height="16" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <line x1="22" y1="8" x2="22" y2="24" stroke="currentColor" stroke-width="1.5"/>
            <line x1="30" y1="8" x2="30" y2="24" stroke="currentColor" stroke-width="1.5"/>
            <line x1="38" y1="8" x2="38" y2="24" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </span>
        <span class="tile__body">
          <span class="tile__name">Resistor</span>
          <span class="tile__desc">Decode colour bands or scan with the camera</span>
        </span>
        <span class="tile__chev" aria-hidden="true">→</span>
      </a>

      <div class="tile tile--placeholder" aria-disabled="true">
        <span class="tile__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="tile__body">
          <span class="tile__name">More soon</span>
          <span class="tile__desc">Sub-apps will appear here</span>
        </span>
      </div>
    </nav>

    <footer class="hub__footer">
      <span class="hub__hint">Add to Home Screen for the full app feel</span>
    </footer>
  </main>

  <script>
    // Service worker: register, then aggressively check for updates on every
    // page load. When a new version is found, activate it immediately and
    // reload the page so the user always sees the latest deployed code.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('sw.js', {
            // Bypass the HTTP cache for the SW file itself, so updates to
            // sw.js are detected on every load.
            updateViaCache: 'none',
          });

          // Check for an updated SW right now.
          reg.update().catch(() => {});

          // When a new SW takes control, reload once to get fresh assets.
          let reloaded = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (reloaded) return;
            reloaded = true;
            window.location.reload();
          });

          // If a new SW is waiting, tell it to activate immediately.
          function promoteWaiting(worker) {
            if (worker && worker.state === 'installed' && navigator.serviceWorker.controller) {
              worker.postMessage({ type: 'SKIP_WAITING' });
            }
          }
          if (reg.waiting) promoteWaiting(reg.waiting);
          reg.addEventListener('updatefound', () => {
            const installing = reg.installing;
            if (!installing) return;
            installing.addEventListener('statechange', () => promoteWaiting(installing));
          });
        } catch (e) {
          // SW registration failed (probably http:// or file://) — that's fine,
          // the app still works without offline support.
        }
      });
    }
  </script>
</body>
</html>
